name: build-readme

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: athul/waka-readme@master
        with:
          API_BASE_URL: ${{ secrets.WAKAPI_BASE_URL }}
          WAKATIME_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
          COMMIT_MESSAGE: Update Wakapi stats
          BLOCKS: '⬜🟨🟩'
          TIME_RANGE: last_30_days
          SHOW_TIME: true
          IGNORED_LANGUAGES: Unknown INI
      - name: Update refresh timestamp
        run: |
          git pull
          TIMESTAMP=$(TZ='Europe/Berlin' date '+%A, %-d %B, %H:%M %Z')
          sed -i "s|Last refresh:.*|Last refresh: $TIMESTAMP|" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update refresh timestamp"
          git push
